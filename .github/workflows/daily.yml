name: Daily SEO Generator

on:
  schedule:
    - cron: "0 2 * * *"  # every day 2AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: node daily-seo-engine.cjs

      - name: Commit updates
        run: |
          git config user.name "seo-bot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "Daily SEO content update" || exit 0
          git push
