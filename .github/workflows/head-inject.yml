name: Auto Head Inject

on:
  workflow_dispatch:               # ← Run button in GitHub Actions tab
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'head-inject.js'

jobs:
  inject:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sanebox  # ← tells every step to run inside /sanebox/

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run head injector
        run: node head-inject.js

      - name: Commit patched files
        working-directory: .        # ← git must run from repo root
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: auto head-inject [skip ci]"
          git push
